<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#D12026">
<title>Tablero del Equipo · HES 1217</title>
<link rel="apple-touch-icon" href="logo_odemas.png">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --rojo:#D12026; --naranja:#F37021; --azul:#336BB4; --verde:#1a8c4e;
    --gris:#777; --linea:#ececec; --bg:#f6f6f7;
  }
  body { font-family:'Montserrat',sans-serif; background:var(--bg); color:#1a1a1a; padding-bottom:40px; }

  /* ---------- Header ---------- */
  header {
    background:#fff; border-bottom:3px solid var(--rojo);
    padding:14px 16px; display:flex; align-items:center; gap:12px;
    position:sticky; top:0; z-index:30;
  }
  header .back { text-decoration:none; color:var(--rojo); font-size:30px; font-weight:700;
    line-height:1; padding:0 6px 4px 0; display:flex; align-items:center; }
  header img { height:34px; width:auto; }
  .h-txt h1 { font-size:15px; font-weight:800; letter-spacing:-.2px; }
  .h-txt p { font-size:11px; color:var(--gris); margin-top:1px; }
  .updated { margin-left:auto; font-size:10px; color:#aaa; text-align:right; line-height:1.3; }
  .updated b { color:var(--verde); display:block; font-size:11px; }

  /* ---------- Buscador ---------- */
  .search-wrap { position:sticky; top:64px; z-index:25; background:var(--bg); padding:12px 16px 6px; }
  .search { display:flex; align-items:center; gap:8px; background:#fff; border:1.5px solid var(--linea);
    border-radius:12px; padding:11px 14px; }
  .search:focus-within { border-color:var(--rojo); }
  .search input { border:none; outline:none; flex:1; font-family:inherit; font-size:15px; background:transparent; }
  .search svg { flex-shrink:0; }

  /* ---------- Filtros (chips) ---------- */
  .chips { display:flex; gap:8px; overflow-x:auto; padding:8px 16px 4px; -ms-overflow-style:none; scrollbar-width:none; }
  .chips::-webkit-scrollbar { display:none; }
  .chip {
    flex-shrink:0; border:1.5px solid var(--linea); background:#fff; color:#555;
    font-family:inherit; font-size:13px; font-weight:600; padding:8px 14px; border-radius:20px;
    cursor:pointer; white-space:nowrap; transition:.12s;
  }
  .chip .n { font-size:11px; opacity:.6; margin-left:3px; }
  .chip.active { background:var(--rojo); color:#fff; border-color:var(--rojo); }

  /* ---------- Contenido ---------- */
  main { padding:8px 16px 0; max-width:560px; margin:0 auto; }
  .grupo-titulo { font-size:11px; font-weight:700; color:#999; text-transform:uppercase;
    letter-spacing:1px; margin:18px 4px 8px; }

  .card { background:#fff; border:1px solid var(--linea); border-left-width:4px;
    border-radius:12px; padding:13px 15px; margin-bottom:10px; }
  .card.alta { box-shadow:0 2px 10px rgba(209,32,38,.07); }
  .card.t-promo { border-left-color:var(--naranja); }
  .card.t-eol   { border-left-color:var(--rojo); }
  .card.t-nov   { border-left-color:var(--azul); }
  .card.t-aviso { border-left-color:var(--verde); }
  .card.t-trans { border-left-color:#7c3aed; }

  .card .top { display:flex; align-items:flex-start; gap:8px; }
  .card h3 { font-size:14.5px; font-weight:700; line-height:1.3; flex:1; }
  .tag { font-size:9.5px; font-weight:800; text-transform:uppercase; letter-spacing:.4px;
    padding:3px 7px; border-radius:6px; flex-shrink:0; }
  .tag.promo { background:#fff5ee; color:var(--naranja); }
  .tag.eol   { background:#fdeaea; color:var(--rojo); }
  .tag.nov   { background:#eef3fb; color:var(--azul); }
  .tag.aviso { background:#eafaf1; color:var(--verde); }
  .tag.trans { background:#f3effe; color:#7c3aed; }
  .card p.det { font-size:12.5px; color:#555; line-height:1.45; margin-top:6px; }
  .card p.warn { font-size:11px; color:var(--rojo); line-height:1.4; margin-top:8px;
    background:#fdeaea; padding:6px 9px; border-radius:7px; font-weight:600; }

  .meta { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-top:9px; }
  .precio { font-size:16px; font-weight:800; color:var(--rojo); }
  .precio .antes { font-size:12px; color:#bbb; text-decoration:line-through; font-weight:600; margin-right:6px; }
  .badge { font-size:11px; font-weight:700; padding:3px 8px; border-radius:6px; background:#f2f2f2; color:#666; }
  .badge.urge { background:#fdeaea; color:var(--rojo); }
  .badge.ok { background:#eafaf1; color:var(--verde); }

  /* ---------- Inventario ---------- */
  .inv-row { display:flex; align-items:center; gap:12px; background:#fff; border:1px solid var(--linea);
    border-radius:10px; padding:11px 14px; margin-bottom:8px; }
  .inv-info { flex:1; min-width:0; }
  .inv-info h4 { font-size:13.5px; font-weight:700; }
  .inv-info span { font-size:11px; color:#aaa; }
  .stock { text-align:center; flex-shrink:0; }
  .stock .num { font-size:20px; font-weight:800; line-height:1; }
  .stock .lbl { font-size:9px; color:#aaa; text-transform:uppercase; letter-spacing:.5px; }
  .stock .lbl.lbl2 { font-size:8px; }
  .stock.ok .num { color:var(--verde); }
  .stock.bajo .num { color:var(--naranja); }
  .stock.cero .num { color:var(--rojo); }
  .exh { font-size:10px; font-weight:700; color:var(--azul); background:#eef3fb;
    padding:4px 8px; border-radius:7px; flex-shrink:0; white-space:nowrap; }
  .exh.eol-ready { background:#eafaf1; color:var(--verde); }
  .exh.eol-pend { background:#fff5ee; color:var(--naranja); }
  .exh.trans-b { background:#f3effe; color:#7c3aed; }
  .card.t-eol.listo { border-left-color:var(--verde); background:#f7fdfa; box-shadow:0 2px 10px rgba(26,140,78,.10); }
  .eol-status { font-size:9.5px; font-weight:800; text-transform:uppercase; letter-spacing:.4px; padding:3px 7px; border-radius:6px; flex-shrink:0; }
  .eol-status.pend { background:#fff5ee; color:var(--naranja); }
  .eol-status.agot { background:#f2f2f2; color:#888; }
  .dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .dot.ok{background:var(--verde);} .dot.bajo{background:var(--naranja);} .dot.cero{background:var(--rojo);}

  .empty { text-align:center; color:#bbb; font-size:13px; padding:40px 20px; }
  footer { text-align:center; font-size:10px; color:#ccc; margin-top:24px; padding:0 16px; }
</style>
</head>
<body>

<header>
  <a href="index.html" class="back" title="Menú">‹</a>
  <img src="logo_odemas.png" alt="Odemás">
  <div class="h-txt">
    <h1>Tablero del Equipo</h1>
    <p>HES 1217 · Angelópolis</p>
  </div>
  <div class="updated">Actualizado<b id="updated">—</b></div>
</header>

<div class="search-wrap">
  <div class="search">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input id="q" type="search" placeholder="Buscar producto, SKU, promo…" autocomplete="off">
  </div>
</div>

<div class="chips" id="chips"></div>

<main id="app"></main>

<footer>Odemás · Grupo Gigante — uso interno HES 1217</footer>

<script src="datos.js"></script>
<script>
const D = window.DATOS || {};
const CLOUD_URL = 'https://script.google.com/macros/s/AKfycbwbZFsiDqZrNitPKNLqr4r6xOFu3VKprtXJacScftIJmcQdAl_yytjxK8BymWvy8I1gjA/exec';
document.getElementById('updated').textContent = D.actualizado || '';

const HOY = new Date();

const FILTROS = [
  { id:'inv',   label:'📊 Inventario' },
  { id:'eol',   label:'🏷️ Vender 50%' },
  { id:'resurtir', label:'🔄 Resurtir' },
  { id:'agotados', label:'📭 Agotados' },
  { id:'transito', label:'🚚 En tránsito' },
  { id:'nov',   label:'📦 Novedades' },
  { id:'aviso', label:'📢 Avisos' },
];
let filtroActivo = 'inv';
let busqueda = '';

function diasRestantes(fecha){
  const f = new Date(fecha+'T00:00:00');
  return Math.round((f - HOY)/86400000);
}
function badgeVigencia(fecha){
  const d = diasRestantes(fecha);
  const txt = d < 0 ? 'Vencida' : d === 0 ? 'Vence hoy' : d === 1 ? 'Vence mañana' : `${d} días`;
  const cls = d <= 2 ? 'urge' : '';
  return `<span class="badge ${cls}">⏳ ${txt}</span>`;
}
function coincide(...campos){
  if(!busqueda) return true;
  return campos.join(' ').toLowerCase().includes(busqueda);
}

const invBySku = {};
(D.inventario||[]).forEach(x=>{ invBySku[x.sku]=x; });
const money = n => '$'+Number(n||0).toLocaleString('es-MX');
const money2 = n => '$'+Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:2, maximumFractionDigits:2});
const eolSkuSet = new Set((D.eol||[]).map(e=>e.sku));

// Variables recalculables cuando llegan datos de la nube
let EOL = [], eolMap = {}, transitoMap = {}, RESURTIR = [];

function calcDerivados(){
  EOL = (D.eol||[]).map(e=>{
    const inv = invBySku[e.sku] || {};
    const stock = inv.stock||0, exhibe = inv.exhibe||0;
    const estado = (stock===0 && exhibe>0) ? 'listo' : (stock>0 ? 'pendiente' : 'agotado');
    return { sku:e.sku, producto:e.producto||inv.producto||('SKU '+e.sku),
      precio:e.precio, precio50:e.precio?e.precio/2:null, stock, exhibe, estado };
  }).filter(e=>e.exhibe>0);
  eolMap = {}; EOL.forEach(e=>{ eolMap[e.sku]=e.estado; });
  transitoMap = {}; (D.transito||[]).forEach(x=>{ transitoMap[x.sku]=(transitoMap[x.sku]||0)+x.cantidad; });
  RESURTIR = (D.inventario||[]).filter(x=>x.stock===0 && x.exhibe>0 && !eolSkuSet.has(x.sku))
              .sort((a,b)=> a.producto.localeCompare(b.producto));
}
calcDerivados();

function cuenta(id){
  if(id==='promo') return (D.promos||[]).filter(x=>coincide(x.titulo,x.detalle)).length;
  if(id==='eol')   return EOL.filter(e=>coincide(e.producto,e.sku) && e.estado==='listo').length;
  if(id==='nov')   return (D.novedades||[]).filter(x=>coincide(x.titulo,x.detalle)).length;
  if(id==='inv')   return (D.inventario||[]).filter(x=>coincide(x.producto,x.sku)).length;
  if(id==='resurtir') return RESURTIR.filter(x=>coincide(x.producto,x.sku)).length;
  if(id==='agotados') return (D.agotados||[]).filter(x=>coincide(x.producto,x.sku)).length;
  if(id==='transito') return (D.transito||[]).filter(x=>coincide(x.producto,x.sku)).length;
  if(id==='aviso') return (D.avisos||[]).filter(x=>coincide(x.titulo,x.detalle)).length;
  return 0;
}

// ¿la sección tiene algún dato? (ignora el buscador, para que las pestañas no salten al escribir)
function seccionTieneItems(id){
  if(id==='promo')    return (D.promos||[]).length>0;
  if(id==='eol')      return EOL.length>0;
  if(id==='transito') return (D.transito||[]).length>0;
  if(id==='nov')      return (D.novedades||[]).length>0;
  if(id==='inv')      return (D.inventario||[]).length>0;
  if(id==='resurtir') return RESURTIR.length>0;
  if(id==='agotados') return (D.agotados||[]).length>0;
  if(id==='aviso')    return (D.avisos||[]).length>0;
  return false;
}

function renderChips(){
  const c = document.getElementById('chips');
  c.innerHTML = FILTROS.filter(f=>seccionTieneItems(f.id)).map(f=>{
    const n = `<span class="n">${cuenta(f.id)}</span>`;
    return `<button class="chip ${filtroActivo===f.id?'active':''}" data-f="${f.id}">${f.label}${n}</button>`;
  }).join('');
  c.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{ filtroActivo=b.dataset.f; render(); });
}

function cardPromo(x){
  return `<div class="card t-promo ${x.prioridad==='alta'?'alta':''}">
    <div class="top"><h3>${x.titulo}</h3><span class="tag promo">Promo</span></div>
    <p class="det">${x.detalle||''}</p>
    <div class="meta">${x.precio?`<span class="precio">${x.precio}</span>`:''}${x.vigencia?badgeVigencia(x.vigencia):''}</div>
  </div>`;
}
function cardEol(e){
  if(e.estado==='listo'){
    return `<div class="card t-eol listo">
      <div class="top"><h3>${e.producto}</h3><span class="tag eol">−50%</span></div>
      <p class="det"><b>✅ Ya se puede vender al 50%</b> — solo la pieza de exhibición (👁 ${e.exhibe}). Stock cerrado en 0.</p>
      <div class="meta">
        ${e.precio50!=null?`<span class="precio"><span class="antes">${money(e.precio)}</span>${money2(e.precio50)}</span>`:`<span class="badge">50% del precio regular</span>`}
        <span class="badge">SKU ${e.sku}</span>
      </div>
      <p class="warn">⚠️ Al 50% pierde garantía de fábrica y NO es elegible para Assurant.</p>
    </div>`;
  }
  if(e.estado==='pendiente'){
    return `<div class="card t-eol">
      <div class="top"><h3>${e.producto}</h3><span class="eol-status pend">EOL</span></div>
      <p class="det">Primero agotar <b>${e.stock}</b> pza(s) de stock cerrado a precio normal${e.precio?' ('+money(e.precio)+')':''}. El <b>50%</b> se activa cuando llegue a 0.</p>
      <div class="meta"><span class="badge">SKU ${e.sku}</span>${e.exhibe?`<span class="exh">👁 ${e.exhibe} exhib.</span>`:''}</div>
    </div>`;
  }
  return `<div class="card t-eol">
    <div class="top"><h3>${e.producto}</h3><span class="eol-status agot">Agotado</span></div>
    <p class="det">Sin stock cerrado ni pieza de exhibición.</p>
    <div class="meta"><span class="badge">SKU ${e.sku}</span></div>
  </div>`;
}
function cardNov(x){
  return `<div class="card t-nov ${x.prioridad==='alta'?'alta':''}">
    <div class="top"><h3>${x.titulo}</h3><span class="tag nov">Nuevo</span></div>
    <p class="det">${x.detalle||''}</p>
    ${x.fecha?`<div class="meta"><span class="badge">📅 ${x.fecha}</span></div>`:''}
  </div>`;
}
function cardAviso(x){
  return `<div class="card t-aviso ${x.prioridad==='alta'?'alta':''}">
    <div class="top"><h3>${x.titulo}</h3><span class="tag aviso">Aviso</span></div>
    <p class="det">${x.detalle||''}</p>
    ${x.fecha?`<div class="meta"><span class="badge">📅 ${x.fecha}</span></div>`:''}
  </div>`;
}
function cardTransito(x){
  return `<div class="card t-trans">
    <div class="top"><h3>${x.producto}</h3><span class="tag trans">🚚 ${x.cantidad}</span></div>
    <p class="det">Vienen <b>${x.cantidad}</b> pza(s) en camino desde el CD. Se puede vender a <b>promesa de entrega</b>.</p>
    <div class="meta"><span class="badge">SKU ${x.sku}</span></div>
  </div>`;
}
function rowAgotado(x){
  return `<div class="inv-row">
    <div class="dot cero"></div>
    <div class="inv-info"><h4>${x.producto}</h4><span>SKU ${x.sku||'—'} · se agotó (0 piso · 0 exhib.)</span></div>
    <span class="exh eol-pend">📥 pedir</span>
    <div class="stock cero"><div class="num">0</div><div class="lbl lbl2">existencia</div></div>
  </div>`;
}
function rowInv(x){
  const cls = x.stock===0 ? 'cero' : x.stock<=3 ? 'bajo' : 'ok';
  const est = eolMap[x.sku];
  const eolB = est==='listo' ? `<span class="exh eol-ready">🏷️ 50%</span>`
             : est==='pendiente' ? `<span class="exh eol-pend">EOL</span>` : '';
  const exh = x.exhibe ? `<span class="exh">👁 ${x.exhibe} exhib.</span>` : '';
  const tr = transitoMap[x.sku];
  const trB = tr ? `<span class="exh trans-b">🚚 ${tr}</span>` : '';
  const vB = (D._invCloud && x._vendido) ? `<span class="exh" style="background:#f0f0f0;color:#999">−${x._vendido} vend.</span>` : '';
  return `<div class="inv-row">
    <div class="dot ${cls}"></div>
    <div class="inv-info"><h4>${x.producto}</h4><span>SKU ${x.sku||'—'}</span></div>
    ${eolB}${exh}${trB}${vB}
    <div class="stock ${cls}"><div class="num">${x.stock}</div><div class="lbl lbl2">para vender</div></div>
  </div>`;
}

function seccion(titulo, items, fn){
  if(!items || !items.length) return '';
  return `<div class="grupo-titulo">${titulo}</div>` + items.map(fn).join('');
}

function render(){
  renderChips();
  const f = filtroActivo;
  let html = '';

  const promos = (D.promos||[]).filter(x=>coincide(x.titulo,x.detalle));
  const eolAll = EOL.filter(e=>coincide(e.producto,e.sku));
  const eolListo = eolAll.filter(e=>e.estado==='listo');
  const eolPend  = eolAll.filter(e=>e.estado==='pendiente');
  const eolAgot  = eolAll.filter(e=>e.estado==='agotado');
  const nov    = (D.novedades||[]).filter(x=>coincide(x.titulo,x.detalle));
  const inv    = (D.inventario||[]).filter(x=>coincide(x.producto,x.sku));
  const resurtir = RESURTIR.filter(x=>coincide(x.producto,x.sku));
  const agotados = (D.agotados||[]).filter(x=>coincide(x.producto,x.sku));
  const transito = (D.transito||[]).filter(x=>coincide(x.producto,x.sku));
  const avisos = (D.avisos||[]).filter(x=>coincide(x.titulo,x.detalle));

  if(f==='aviso') html += seccion('📢 Avisos', avisos, cardAviso);
  if(f==='eol'){
    html += seccion('🏷️ Vender al 50% · pieza de exhibición', eolListo, cardEol);
    html += seccion('⏳ EOL próximos · agotar stock cerrado', eolPend, cardEol);
    html += seccion('Agotados', eolAgot, cardEol);
  }
  if(f==='promo') html += seccion('🔥 Promociones vigentes', promos, cardPromo);
  if(f==='nov')   html += seccion('📦 Mercancía nueva', nov, cardNov);
  if(f==='resurtir') html += seccion('🔄 Resurtir · 0 para vender, solo queda exhibición (no EOL)', resurtir, rowInv);
  if(f==='agotados') html += seccion('📭 Agotados · se agotaron (no EOL) — pedir resurtido', agotados, rowAgotado);
  if(f==='transito') html += seccion('🚚 En tránsito · venta a promesa de entrega', transito, cardTransito);
  if(f==='inv')   html += seccion('📊 Inventario · existencias', inv, rowInv);

  if(!html.trim()) html = `<div class="empty">Sin resultados${busqueda?` para “${busqueda}”`:''}.</div>`;
  document.getElementById('app').innerHTML = html;
}

document.getElementById('q').addEventListener('input', e=>{
  busqueda = e.target.value.trim().toLowerCase();
  render();
});

function cargarInventarioNube(){
  const cb = '_cbInv' + Date.now();
  window[cb] = function(data){
    delete window[cb];
    const sc = document.getElementById('_inv_sc');
    if(sc) sc.remove();
    // Actualiza stock en cada producto del inventario local
    (D.inventario||[]).forEach(function(item){
      const cl = data[item.sku];
      if(cl && typeof cl.o === 'number'){
        item._onhand  = cl.o;
        item._vendido = cl.v || 0;
        item.stock    = Math.max(0, cl.o - (cl.v || 0));
      }
    });
    D._invCloud = true;
    const t = new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
    const el = document.getElementById('updated');
    if(el) el.innerHTML = 'Live ' + t + '<b style="color:var(--verde);display:block;font-size:11px">● en vivo</b>';
    calcDerivados();
    render();
  };
  const sc = document.createElement('script');
  sc.id = '_inv_sc';
  sc.src = CLOUD_URL + '?modo=inventario&callback=' + cb;
  sc.onerror = function(){ delete window[cb]; sc.remove(); };
  document.head.appendChild(sc);
}

render();
cargarInventarioNube();
</script>
</body>
</html>
