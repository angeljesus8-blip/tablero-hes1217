<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#D12026">
<title>Tablero del Equipo · HES 1217</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="HES 1217">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --rojo:#D12026; --naranja:#F37021; --azul:#336BB4; --verde:#1a8c4e;
    --gris:#777; --linea:#ececec; --bg:#f6f6f7;
  }
  body { font-family:'Montserrat',sans-serif; background:var(--bg); color:#1a1a1a; padding-bottom:40px; }

  /* ---------- Header ---------- */
  header {
    background:#fff; border-bottom:3px solid var(--rojo);
    padding:14px 16px; display:flex; align-items:center; gap:12px;
    position:sticky; top:0; z-index:30;
  }
  header .back { text-decoration:none; color:var(--rojo); font-size:30px; font-weight:700;
    line-height:1; padding:0 6px 4px 0; display:flex; align-items:center; }
  header img { height:34px; width:auto; }
  .h-txt h1 { font-size:15px; font-weight:800; letter-spacing:-.2px; }
  .h-txt p { font-size:11px; color:var(--gris); margin-top:1px; }
  .updated { margin-left:auto; font-size:10px; color:#aaa; text-align:right; line-height:1.3; }
  .updated b { color:var(--verde); display:block; font-size:11px; }
  #liveWarning { display:none; align-items:flex-start; gap:10px; background:#fff5ee;
    border-left:4px solid var(--naranja); margin:0 16px 8px; border-radius:10px;
    padding:12px 14px; font-size:12px; line-height:1.5; }
  #liveWarning.visible { display:flex; }
  #liveWarning .lw-icon { font-size:20px; flex-shrink:0; margin-top:1px; }
  #liveWarning b { font-size:13px; font-weight:800; color:var(--rojo); display:block; margin-bottom:2px; }
  #liveWarning p { color:#7a4a00; font-weight:600; margin:0; }
  #liveWarning.err { background:#fdeaea; border-color:var(--rojo); }
  #liveWarning.err p { color:var(--rojo); }

  /* ---------- Buscador ---------- */
  .search-wrap { position:sticky; top:64px; z-index:25; background:var(--bg); padding:12px 16px 6px; }
  .search { display:flex; align-items:center; gap:8px; background:#fff; border:1.5px solid var(--linea);
    border-radius:12px; padding:11px 14px; }
  .search:focus-within { border-color:var(--rojo); }
  .search input { border:none; outline:none; flex:1; font-family:inherit; font-size:15px; background:transparent; }
  .search svg { flex-shrink:0; }

  /* ---------- Filtros (chips) ---------- */
  .chips { display:flex; gap:8px; overflow-x:auto; padding:8px 16px 4px; -ms-overflow-style:none; scrollbar-width:none; }
  .chips::-webkit-scrollbar { display:none; }
  .chip {
    flex-shrink:0; border:1.5px solid var(--linea); background:#fff; color:#555;
    font-family:inherit; font-size:13px; font-weight:600; padding:8px 14px; border-radius:20px;
    cursor:pointer; white-space:nowrap; transition:.12s;
  }
  .chip .n { font-size:11px; opacity:.6; margin-left:3px; }
  .chip.active { background:var(--rojo); color:#fff; border-color:var(--rojo); }

  /* ---------- Contenido ---------- */
  main { padding:8px 16px 0; max-width:560px; margin:0 auto; }
  .grupo-titulo { font-size:11px; font-weight:700; color:#999; text-transform:uppercase;
    letter-spacing:1px; margin:18px 4px 8px; }

  .card { background:#fff; border:1px solid var(--linea); border-left-width:4px;
    border-radius:12px; padding:13px 15px; margin-bottom:10px; }
  .card.alta { box-shadow:0 2px 10px rgba(209,32,38,.07); }
  .card.t-promo  { border-left-color:var(--naranja); }
  .card.t-bundle { border-left-color:var(--verde); }
  .card.t-eol   { border-left-color:var(--rojo); }
  .card.t-nov   { border-left-color:var(--azul); }
  .card.t-aviso { border-left-color:var(--verde); }
  .card.t-trans { border-left-color:#7c3aed; }

  .card .top { display:flex; align-items:flex-start; gap:8px; }
  .card h3 { font-size:14.5px; font-weight:700; line-height:1.3; flex:1; }
  .tag { font-size:9.5px; font-weight:800; text-transform:uppercase; letter-spacing:.4px;
    padding:3px 7px; border-radius:6px; flex-shrink:0; }
  .tag.promo  { background:#fff5ee; color:var(--naranja); }
  .tag.bundle { background:#edfaf3; color:var(--verde); }
  .tag.eol   { background:#fdeaea; color:var(--rojo); }
  .tag.nov   { background:#eef3fb; color:var(--azul); }
  .tag.aviso { background:#eafaf1; color:var(--verde); }
  .tag.trans { background:#f3effe; color:#7c3aed; }
  .card p.det { font-size:12.5px; color:#555; line-height:1.45; margin-top:6px; }
  .card p.warn { font-size:11px; color:var(--rojo); line-height:1.4; margin-top:8px;
    background:#fdeaea; padding:6px 9px; border-radius:7px; font-weight:600; }

  .meta { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-top:9px; }
  .precio { font-size:16px; font-weight:800; color:var(--rojo); }
  .precio .antes { font-size:12px; color:#bbb; text-decoration:line-through; font-weight:600; margin-right:6px; }
  .badge { font-size:11px; font-weight:700; padding:3px 8px; border-radius:6px; background:#f2f2f2; color:#666; }
  .badge.urge { background:#fdeaea; color:var(--rojo); }
  .badge.ok { background:#eafaf1; color:var(--verde); }

  /* ---------- Inventario ---------- */
  .inv-row { display:flex; align-items:center; gap:12px; background:#fff; border:1px solid var(--linea);
    border-radius:10px; padding:11px 14px; margin-bottom:8px; }
  .inv-info { flex:1; min-width:0; }
  .inv-info h4 { font-size:13.5px; font-weight:700; }
  .inv-info span { font-size:11px; color:#aaa; }
  .stock { text-align:center; flex-shrink:0; }
  .stock .num { font-size:20px; font-weight:800; line-height:1; }
  .stock .lbl { font-size:9px; color:#aaa; text-transform:uppercase; letter-spacing:.5px; }
  .stock .lbl.lbl2 { font-size:8px; }
  .stock.ok .num { color:var(--verde); }
  .stock.bajo .num { color:var(--naranja); }
  .stock.cero .num { color:var(--rojo); }
  .exh { font-size:10px; font-weight:700; color:var(--azul); background:#eef3fb;
    padding:4px 8px; border-radius:7px; flex-shrink:0; white-space:nowrap; }
  .exh.eol-ready { background:#eafaf1; color:var(--verde); }
  .exh.eol-pend { background:#fff5ee; color:var(--naranja); }
  .exh.trans-b { background:#f3effe; color:#7c3aed; }
  .card.t-eol.listo { border-left-color:var(--verde); background:#f7fdfa; box-shadow:0 2px 10px rgba(26,140,78,.10); }
  .eol-status { font-size:9.5px; font-weight:800; text-transform:uppercase; letter-spacing:.4px; padding:3px 7px; border-radius:6px; flex-shrink:0; }
  .eol-status.pend { background:#fff5ee; color:var(--naranja); }
  .eol-status.agot { background:#f2f2f2; color:#888; }
  .dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .dot.ok{background:var(--verde);} .dot.bajo{background:var(--naranja);} .dot.cero{background:var(--rojo);}
  /* ---- Selector seguro + MSI ---- */
  .seg-sel { margin-top:10px; }
  .seg-chips { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
  .seg-chip { border:1.5px solid var(--linea); background:#fff; color:#555;
    font-family:inherit; font-size:12px; font-weight:700; padding:6px 13px;
    border-radius:20px; cursor:pointer; transition:.12s; }
  .seg-chip.active { background:var(--azul); color:#fff; border-color:var(--azul); }
  .seg-desglose { display:flex; align-items:baseline; flex-wrap:wrap; gap:4px; margin-bottom:4px; }
  .seg-precio-total { font-size:22px; font-weight:800; color:var(--rojo); line-height:1.2; }
  .seg-prod { font-size:16px; font-weight:700; color:#999; }
  .seg-op { font-size:13px; color:#aaa; font-weight:600; white-space:nowrap; }
  .seg-msi { margin-top:5px; }
  .msi-badge { display:inline-block; font-size:11px; font-weight:700;
    padding:4px 9px; border-radius:7px; }
  .msi-6  { background:#eafaf1; color:var(--verde); }
  .msi-12 { background:#eef3fb; color:var(--azul); }
  .msi-18 { background:#fff5ee; color:var(--naranja); }

  .empty { text-align:center; color:#bbb; font-size:13px; padding:40px 20px; }
  footer { text-align:center; font-size:10px; color:#ccc; margin-top:24px; padding:0 16px; }
  .promo-toolbar { display:flex; align-items:center; justify-content:space-between; padding:8px 16px 4px; }
  .promo-toolbar span { font-size:12px; color:#aaa; font-weight:600; }
  .promo-toolbar button { font-family:'Montserrat',sans-serif; font-size:12px; font-weight:700;
    background:var(--rojo); color:#fff; border:none; border-radius:8px; padding:6px 13px; cursor:pointer; }
  .promo-toolbar button:disabled { background:#ccc; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .promo-toolbar button.girando { animation:spin .7s linear infinite; }
  /* ---- Slider promos ---- */
  .promo-tabs { display:flex; gap:8px; padding:8px 16px 4px; }
  .promo-tab { flex:1; padding:9px 10px; border:1.5px solid var(--linea); background:#fff;
    border-radius:20px; font-family:'Montserrat',sans-serif; font-size:12px; font-weight:700;
    cursor:pointer; color:#555; transition:.15s; }
  .promo-tab.active { background:var(--azul); color:#fff; border-color:var(--azul); }
  .promo-slider { display:flex; overflow-x:auto; scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .promo-slider::-webkit-scrollbar { display:none; }
  .promo-slide { min-width:100%; scroll-snap-align:start; box-sizing:border-box; }
  .promo-dots { display:flex; justify-content:center; gap:8px; padding:6px 0 2px; }
  .promo-dot { width:8px; height:8px; border-radius:50%; background:#e0e0e0; transition:.15s; }
  .promo-dot.active { background:var(--azul); }
  /* ---- Dashboard ---- */
  .att-card { padding:18px 18px 14px; }
  .att-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; font-size:13px; font-weight:700; color:#555; }
  .att-reset { background:none; border:1.5px solid var(--linea); border-radius:8px; padding:4px 10px; font-family:'Montserrat',sans-serif; font-size:11px; font-weight:700; color:#aaa; cursor:pointer; }
  .att-rate { font-size:54px; font-weight:800; line-height:1; margin-bottom:4px; }
  .att-sub { font-size:12px; color:#888; font-weight:600; margin-bottom:10px; min-height:16px; }
  /* ── Barra de meta ── */
  .att-prog { margin:0 0 12px; }
  .att-prog-track { position:relative; height:9px; background:#f0f0f0; border-radius:10px; overflow:hidden; }
  .att-prog-fill { height:100%; border-radius:10px; transition:.4s; }
  .att-prog-goal { position:absolute; top:0; bottom:0; left:25%; width:2.5px; background:var(--verde); opacity:.5; }
  .att-prog-lbl { display:flex; justify-content:space-between; font-size:10px; color:#bbb; font-weight:600; margin-top:3px; }
  .att-prog-lbl .meta { color:var(--verde); }
  /* ── Leaderboard ── */
  .lead-card { padding:14px 15px; }
  .lead-head { font-size:11px; font-weight:800; color:#999; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
  .lead-row { display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:1px solid var(--linea); }
  .lead-row:last-of-type { border-bottom:none; }
  .lead-name { flex:1; font-size:13px; font-weight:700; }
  .lead-ventas { font-size:11px; color:#aaa; font-weight:700; white-space:nowrap; min-width:52px; text-align:center; }
  .lead-att { font-size:12px; font-weight:800; white-space:nowrap; min-width:80px; text-align:right; }
  /* ── Botones ── */
  .att-btns { display:flex; gap:10px; }
  .att-btn { flex:1; padding:12px; border:none; border-radius:12px; font-family:'Montserrat',sans-serif; font-size:13px; font-weight:800; cursor:pointer; }
  .att-si { background:#eafaf1; color:var(--verde); }
  .att-no { background:#fdeaea; color:var(--rojo); }
  .dash-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 16px 16px; }
  .dash-stat { background:#fff; border-radius:14px; padding:16px 12px; text-align:center; border:1px solid #ececec; cursor:pointer; active:opacity:.8; }
  .dash-n { font-size:34px; font-weight:800; line-height:1; color:#1a1a1a; }
  .dash-lbl { font-size:11px; color:#888; font-weight:700; margin-top:5px; }
  /* ---- WhatsApp share ---- */
  .btn-wa { display:flex; align-items:center; justify-content:center; gap:6px; background:#eafaf1; color:#128C7E; border:none; border-radius:10px; padding:9px 14px; font-family:'Montserrat',sans-serif; font-size:12px; font-weight:700; cursor:pointer; margin-top:10px; width:100%; }

  .eol-bundle-tip { margin-top:10px; padding:9px 11px; border-radius:9px; background:#fff8ec; border:1px solid #ffe6bd; }
  .eol-bundle-tip .tip-lbl { font-size:10.5px; font-weight:800; color:var(--naranja); text-transform:uppercase; letter-spacing:.4px; }
  .eol-bundle-tip .tip-nom { font-size:12.5px; font-weight:700; margin-top:2px; }
  .eol-bundle-tip .precio { font-size:15px; }

  .combo-group { margin-bottom:16px; }
  .combo-group-lbl { font-size:11.5px; font-weight:800; color:var(--naranja); margin:0 2px 8px; display:flex; align-items:center; gap:5px; }
  .combo-carousel { display:flex; gap:10px; overflow-x:auto; scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch; scrollbar-width:none; padding:0 2px 6px; margin:0 -2px; }
  .combo-carousel::-webkit-scrollbar { display:none; }
  .combo-slide { flex:0 0 88%; width:88%; min-width:0; scroll-snap-align:start; }
  .combo-slide .card { margin-bottom:0; height:100%; }
  .combo-dots { display:flex; justify-content:center; gap:6px; margin-top:2px; }
  .combo-dots span { width:5px; height:5px; border-radius:50%; background:#e0d5c5; }
</style>
</head>
<body>

<header>
  <a href="index.html" class="back" title="Menú">‹</a>
  <img src="logo_odemas.png" alt="Odemás">
  <div class="h-txt">
    <h1>Tablero del Equipo</h1>
    <p id="headerStoreSub">HES · ---</p>
  </div>
  <div class="updated">Actualizado<b id="updated">—</b></div>
  <button id="btnBell" onclick="activarNotifs()" title="Activar avisos push" style="background:none;border:none;cursor:pointer;padding:4px 4px;font-size:22px;line-height:1;color:#ddd;margin-left:2px;flex-shrink:0" aria-label="Notificaciones">🔔</button>
</header>

<div class="search-wrap">
  <div class="search">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input id="q" type="search" placeholder="Buscar producto, SKU, promo…" autocomplete="off">
  </div>
</div>

<div class="chips" id="chips"></div>

<div id="liveWarning">
  <span class="lw-icon">⚠️</span>
  <div>
    <b>Inventario sin confirmar</b>
    <p id="liveWarningMsg">Conectando… no cotices piezas al cliente hasta ver <b style="color:var(--verde)">● en vivo</b> arriba</p>
  </div>
</div>

<main id="app"></main>

<footer id="tbFooter">Odemás · Grupo Gigante — uso interno HES</footer>

<script src="datos.js"></script>
<script>
const D = window.DATOS || {};
const _cfg = (function(){ try{ return JSON.parse(localStorage.getItem('hes_store')||'null'); }catch(e){ return null; } })();
const CLOUD_URL = (_cfg && _cfg.gas_url) ? _cfg.gas_url : 'https://script.google.com/macros/s/AKfycbwbZFsiDqZrNitPKNLqr4r6xOFu3VKprtXJacScftIJmcQdAl_yytjxK8BymWvy8I1gjA/exec';
const TIENDA_ID     = (_cfg && _cfg.store_id) || '1217';
const TIENDA_NOMBRE = (_cfg && _cfg.nombre)   || 'Angelópolis';
const ROLE          = localStorage.getItem('hes_role') || 'asesor';
document.getElementById('updated').innerHTML = '<span style="color:var(--naranja);font-weight:700">Sin confirmar</span>';
document.getElementById('liveWarning').classList.add('visible');
(function(){
  const el=document.getElementById('headerStoreSub'); if(el) el.textContent='HES '+TIENDA_ID+' · '+TIENDA_NOMBRE;
  const ft=document.getElementById('tbFooter'); if(ft) ft.textContent='Odemás · Grupo Gigante — uso interno HES '+TIENDA_ID;
})();

const HOY = new Date();

const FILTROS = [
  { id:'inicio', label:'🏠 Inicio' },
  { id:'inv',    label:'📊 Inventario' },
  { id:'bundle', label:'🎁 Bundles' },
  { id:'promo',  label:'🔥 Promos' },
  { id:'eol',   label:'🏷️ Vender 50%' },
  { id:'resurtir', label:'🔄 Resurtir' },
  { id:'transito', label:'🚚 En tránsito' },
  { id:'nov',   label:'📦 Novedades' },
  { id:'aviso', label:'📢 Avisos' },
];
let filtroActivo = 'inicio';
let busqueda = '';

function diasRestantes(fecha){
  const f = new Date(fecha+'T00:00:00');
  return Math.round((f - HOY)/86400000);
}
function badgeVigencia(fecha){
  const d = diasRestantes(fecha);
  const txt = d < 0 ? 'Vencida' : d === 0 ? 'Vence hoy' : d === 1 ? 'Vence mañana' : `${d} días`;
  const cls = d <= 2 ? 'urge' : '';
  return `<span class="badge ${cls}">⏳ ${txt}</span>`;
}
function coincide(...campos){
  if(!busqueda) return true;
  return campos.join(' ').toLowerCase().includes(busqueda);
}

const invBySku = {};
(D.inventario||[]).forEach(x=>{ invBySku[x.sku]=x; });
const money = n => '$'+Number(n||0).toLocaleString('es-MX');
const money2 = n => '$'+Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:2, maximumFractionDigits:2});
const eolSkuSet = new Set((D.eol||[]).map(e=>e.sku));

// SKUs EOL pausados por indicacion del area comercial — no mostrar como vendibles
// aunque el sistema ya los marque "listo" (ver [[project_hes_ang...]] combos EOL)
const EOL_PAUSADOS = new Set(['100280724']); // MatePad 11.5" VD+TCL — pendiente autorizacion comercial

// Variables recalculables cuando llegan datos de la nube
let EOL = [], eolMap = {}, transitoMap = {}, RESURTIR = [], AGOTADOS = [];
const PROMOS_KEY   = 'hes1217_promos_cache';
const BUNDLES_KEY  = 'hes1217_bundles_cache';
let PROMOS = [];
let BUNDLES = [];

// Cache de bundles
(function(){
  try{
    const c=JSON.parse(localStorage.getItem(BUNDLES_KEY)||'null');
    const hoy=new Date().toISOString().slice(0,10);
    if(Array.isArray(c)) BUNDLES=c.filter(x=>(!x.d1||hoy>=x.d1)&&(!x.d2||hoy<=x.d2));
  }catch(e){}
})();   // promociones vigentes — se cargan de la nube y se cachean en localStorage

// Carga cache guardado para mostrar promos al instante aunque no haya red
(function(){
  try{
    const c = JSON.parse(localStorage.getItem(PROMOS_KEY)||'null');
    if(Array.isArray(c) && c.length){
      const hoy = new Date().toISOString().slice(0,10);
      PROMOS = c.filter(x=> (!x.d1||hoy>=x.d1) && (!x.d2||hoy<=x.d2));
    }
  }catch(e){}
})();

// Tabla Assurant "Lista de precios EC total 2025" — Reemplazo (<$5k) y Reparación ($5k+)
const SEGUROS = [
  { d:250,   h:499.99,  p1:109,  p2:149,  s1:'100183730', s2:'100184003' },
  { d:500,   h:749.99,  p1:159,  p2:229,  s1:'100183748', s2:'100184011' },
  { d:750,   h:999.99,  p1:229,  p2:309,  s1:'100183756', s2:'100184020' },
  { d:1000,  h:1249.99, p1:259,  p2:389,  s1:'100183764', s2:'100184038' },
  { d:1250,  h:1499.99, p1:319,  p2:459,  s1:'100183772', s2:'100184046' },
  { d:1500,  h:1749.99, p1:369,  p2:529,  s1:'100183781', s2:'100184054' },
  { d:1750,  h:1999.99, p1:429,  p2:609,  s1:'100183799', s2:'100184062' },
  { d:2000,  h:2249.99, p1:559,  p2:679,  s1:'100183801', s2:'100184071' },
  { d:2250,  h:2499.99, p1:629,  p2:919,  s1:'100183810', s2:'100184089' },

function compartirWA(prodEnc,sku,pv,pb,sinSeguro,incluyeEnc){
  const producto=decodeURIComponent(prodEnc);
  let msg='*'+producto+'*';
  if(incluyeEnc){ msg+='\n'+decodeURIComponent(incluyeEnc); }
  msg+='\n💰 '+money(pv);
  // Los bundles ya traen el seguro incluido dentro de su precio — ofrecerlo
  // aparte aquí sería cobrarlo dos veces (ver sinSeguro=true en cardBundle).
  if(!sinSeguro){
    const s=seguroPara(pb||pv);
    if(s){
      msg+='\n\n🛡️ Seguro:\n  +1 año: '+money(pv+s.p1)+'\n  +2 años: '+money(pv+s.p2);
      // Relojes de $8,000+ con seguro: regalo de cuerda digital de saltar
      const esReloj = /WATCH/i.test(producto) && !/BAND/i.test(producto);
      if(esReloj && (pb||pv) >= 8000){
        msg += '\n\n🎁 ¡Agrega el seguro y llévate una cuerda digital de saltar de regalo!';
      }
    }
  }
  const msi=[];
  if(pv>=1500) msi.push('6 MSI');
  if(pv>=10000) msi.push('12 MSI');
  if(pv>=20000) msi.push('18 MSI*');
  if(msi.length) msg+='\n\n💳 '+msi.join(' · ')+' disponibles';
  msg+='\n\n_HES Angelópolis Puebla_';
  window.open('https://wa.me/?text='+encodeURIComponent(msg.trim()),'_blank');
}

    const precio = e.precio || inv.precio || 0;
    return { sku:e.sku, producto:e.producto||inv.producto||('SKU '+e.sku),
      precio:precio, precio50:precio?precio/2:null, stock, exhibe, estado };

  eolMap = {}; EOL.forEach(e=>{ eolMap[e.sku]=e.estado; });
  transitoMap = {}; (D.transito||[]).forEach(x=>{ transitoMap[x.sku]=(transitoMap[x.sku]||0)+x.cantidad; });

function cuenta(id){
  if(id==='inicio') return '';
  if(id==='bundle') return BUNDLES.filter(x=>coincide(x.nombre,x.sku1,x.sku2)).length;
  if(id==='promo') return PROMOS.filter(x=>coincide(x.producto,x.sku) && tieneExistencia_(x.sku)).length;
  if(id==='eol')   return EOL.filter(e=>coincide(e.producto,e.sku) && e.estado==='listo').length;
  if(id==='nov')   return (D.novedades||[]).filter(x=>coincide(x.titulo,x.detalle)).length;
  if(id==='inv')   return (D.inventario||[]).filter(x=>coincide(x.producto,x.sku)&&((x.stock||0)>0||(x.exhibe||0)>0)).length;
  if(id==='resurtir') return [...AGOTADOS,...RESURTIR].filter(x=>coincide(x.producto,x.sku)).length;
  if(id==='transito') return (D.transito||[]).filter(x=>coincide(x.producto,x.sku)).length;
  if(id==='aviso') return (D.avisos||[]).filter(x=>coincide(x.titulo,x.detalle)).length;
  return 0;
}

function seccionTieneItems(id){
  if(id==='inicio')   return true;
  if(id==='bundle')   return BUNDLES.length>0;
  if(id==='promo')    return PROMOS.length>0;
  if(id==='eol')      return EOL.length>0;
  if(id==='transito') return (D.transito||[]).length>0;
  if(id==='nov')      return (D.novedades||[]).length>0;
  if(id==='inv')      return (D.inventario||[]).length>0;
  if(id==='resurtir') return RESURTIR.length>0 || AGOTADOS.length>0;
  if(id==='aviso')    return (D.avisos||[]).length>0;
  return false;
}

function mainSkuBundle(b){
  return (b.skus||'').split(',')[0].trim();
}
function seccionBundles(titulo, items){
  if(!items || !items.length) return '';
  const grupos = [], idx = {};
  items.forEach(b=>{
    const ms = mainSkuBundle(b);
    if(idx[ms]==null){ idx[ms]=grupos.length; grupos.push({sku:ms, items:[]}); }
    grupos[idx[ms]].items.push(b);
  });
  const html = grupos.map(g=>{
    if(g.items.length===1) return cardBundle(g.items[0]);
    const nombreProd = invBySku[g.sku]?invBySku[g.sku].producto:'Producto';
    const dots = g.items.map(()=>'<span></span>').join('');
    return `<div class="combo-group">
      <div class="combo-group-lbl">🔀 ${nombreProd} · ${g.items.length} opciones — desliza para ver más →</div>
      <div class="combo-carousel">${g.items.map(b=>`<div class="combo-slide">${cardBundle(b)}</div>`).join('')}</div>
      <div class="combo-dots">${dots}</div>
    </div>`;
  }).join('');
  return `<div class="grupo-titulo">${titulo}</div>` + html;
}

function cargarInventarioNube(){
  const cb = '_cbInv' + Date.now();
  window[cb] = function(data){
    delete window[cb];
    const sc = document.getElementById('_inv_sc');
    if(sc) sc.remove();
    // Stock cerrado (almacén) = ON HAND − vendido. NO incluye la exhibición:
    // la pieza de exhibición solo es vendible si el producto es EOL, y eso se
    // maneja aparte (tarjetas EOL 50% / sección Resurtir).
    function stockDe(cl){
      return Math.max(0, (cl.o || 0) - (cl.v || 0));
    }
    // Piezas de exhibición que quedan. Las ventas consumen primero el almacén
    // y solo lo que exceda al ON HAND baja de la exhibición — así, al vender la
    // pieza de exhibición (permitido en EOL), ésta se descuenta y deja de verse.
    function exhibeDe(cl){
      const vendidasDeExhib = Math.max(0, (cl.v || 0) - (cl.o || 0));
      return Math.max(0, (cl.e || 0) - vendidasDeExhib);
    }
    // Actualiza stock en cada producto del inventario local
    (D.inventario||[]).forEach(function(item){
      const cl = data[item.sku];
      if(cl && typeof cl.o === 'number'){
        item._onhand  = cl.o;
        item._vendido = cl.v || 0;
        item.stock    = stockDe(cl);
        item.exhibe   = exhibeDe(cl);
        if(cl.p && !item.precio) item.precio = parseFloat(String(cl.p).replace(/[^0-9.]/g,''))||0;
      }
    });
    // Agrega al inventario local los SKUs que el GAS conoce (Catalogo o Catalogo_ref)
    // pero que no están en datos.js — esto incluye productos agotados que ya no vienen
    // en el Excel de Sonar pero el GAS los conserva vía Catalogo_ref
    const skusLocales = new Set((D.inventario||[]).map(function(x){ return x.sku; }));
    Object.keys(data).forEach(function(sku){
      if(skusLocales.has(sku)) return;
      const cl = data[sku];
      if(!cl || !cl.d) return; // sin descripción → SKU vacío, ignorar
      const item = {
        sku: sku,
        producto: cl.d,
        stock:    stockDe(cl),
        exhibe:   exhibeDe(cl),
        precio:   parseFloat(String(cl.p||'').replace(/[^0-9.]/g,''))||0
      };
      if(!D.inventario) D.inventario = [];
      D.inventario.push(item);
      invBySku[sku] = item;
    });
    // Actualiza invBySku para SKUs EOL que no están en D.inventario
    (D.eol||[]).forEach(function(e){
      if(invBySku[e.sku]) return;
      const cl = data[e.sku];
      if(!cl) return;
      invBySku[e.sku] = {
        sku: e.sku, producto: cl.d||'',
        stock: stockDe(cl),
        exhibe: exhibeDe(cl),
        precio: parseFloat(String(cl.p||'').replace(/[^0-9.]/g,''))||0
      };
    });
    D._invCloud = true;
    const w = document.getElementById('liveWarning');
    if(w){ w.classList.remove('visible'); w.classList.remove('err'); }
    const t = new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
    const el = document.getElementById('updated');
    if(el) el.innerHTML = 'Live ' + t + '<b style="color:var(--verde);display:block;font-size:11px">● en vivo</b>';
    calcDerivados();
    render();
  };
  const sc = document.createElement('script');
  sc.id = '_inv_sc';
  sc.src = CLOUD_URL + '?modo=inventario&callback=' + cb;
  sc.onerror = function(){
    delete window[cb]; sc.remove();
    const w = document.getElementById('liveWarning');
    const m = document.getElementById('liveWarningMsg');
    if(w){ w.classList.add('visible'); w.classList.add('err'); }
    if(m) m.innerHTML = 'Sin conexión al inventario en vivo — <b>los números que ves pueden estar desactualizados</b>';
    const el = document.getElementById('updated');
    if(el) el.innerHTML = '<span style="color:var(--rojo);font-weight:700">Sin conexión</span>';
  };
  document.head.appendChild(sc);
}

// ── Push notifications (OneSignal) ──────────────────────────────
const ONE_APP_ID = 'db32a1ef-d484-4be3-adfc-2a9e17f7e4f1';

function actualizarCampana(){
  const btn=document.getElementById('btnBell');
  if(!btn) return;
  const p=('Notification' in window)?Notification.permission:'default';
  btn.style.color = p==='granted'?'var(--rojo)':'#ddd';
  btn.title = p==='granted'?'Avisos push activados':'Activar avisos push';
}

async function activarNotifs(){
  if(ONE_APP_ID==='TU_APP_ID_AQUI'){
    alert('⚠️ El admin aún no configuró las notificaciones push.'); return;
  }
  if(!('Notification' in window)){ alert('Tu navegador no soporta notificaciones.'); return; }
  if(Notification.permission==='granted'){
    alert('Ya tienes las notificaciones activadas ✓'); return;
  }
  if(typeof OneSignal==='undefined'){ alert('Cargando SDK… intenta de nuevo.'); return; }
  try{
    await OneSignal.Notifications.requestPermission();
    actualizarCampana();
  }catch(e){ console.warn('Push error',e); }
}

window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function(OneSignal){
  if(ONE_APP_ID==='TU_APP_ID_AQUI') return;
  await OneSignal.init({
    appId: ONE_APP_ID,
    serviceWorkerPath: 'sw.js',
    serviceWorkerParam: { scope: '/' },
    notifyButton: { enable: false }
  });
  actualizarCampana();
});

actualizarCampana();
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js?v=74').catch(()=>{});
}
</script>
